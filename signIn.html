<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In | Burger Blast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-5 shadow-lg border-warning" style="width: 420px; border-radius: 25px;">
            <h2 class="text-center fw-bold mb-4 text-dark">Welcome Back</h2>
            <form action="404.html">
                <div class="mb-4">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="hina@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold py-2">Sign In</button>
            </form>
            <hr class="my-4">
            <div class="text-center"><a href="index.html" class="text-muted text-decoration-none">Back to Website</a></div>
        </div>
    </div>
</body>
</html>
