<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Summary | Burger Blast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .cart-card { border: none; border-radius: 8px; background: #fff; max-width: 450px; margin: 50px auto; padding: 30px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .checkout-btn { background-color: #48c78e; color: white; border: none; width: 100%; padding: 12px; font-weight: bold; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="cart-card shadow-sm">
        <div class="mb-4">
            <a href="index.html" class="text-decoration-none text-muted small">
                <i class="bi bi-chevron-left"></i> BACK TO MENU
            </a>
        </div>

        <h6 class="fw-bold border-bottom pb-2 mb-3">YOUR ORDER</h6>

        <div id="cart-list"></div>

        <div class="mt-4 pt-3">
            <div class="d-flex justify-content-between fw-bold fs-5">
                <span>Total</span>
                <span id="final-total">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="location.href='404.html'">PROCEED TO CHECKOUT</button>
        </div>
    </div>
</div>

<script>
    const render = () => {
        const cart = JSON.parse(localStorage.getItem('burgerCart')) || [];
        const list = document.getElementById('cart-list');
        const totalDisplay = document.getElementById('final-total');
        
        // Fix: If cart is empty, set price to 0 and stop
        if (cart.length === 0) {
            list.innerHTML = `<div class="text-center py-5 text-muted">Your basket is empty.</div>`;
            totalDisplay.innerText = "$0.00";
            return;
        }

        list.innerHTML = cart.map((item, i) => `
            <div class="item-row">
                <div class="d-flex align-items-center">
                    <img src="${item.image}" class="item-img me-3">
                    <div>
                        <h6 class="mb-0 fw-bold" style="font-size: 0.9rem;">${item.name}</h6>
                        <small class="text-muted">Quick Delivery</small>
                    </div>
                </div>
                <div class="text-end">
                    <div class="fw-bold mb-1">$${item.price.toFixed(2)}</div>
                    <button class="btn btn-sm p-0 text-danger" onclick="remove(${i})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');

        // Sum calculation without shipping
        const total = cart.reduce((s, item) => s + item.price, 0);
        totalDisplay.innerText = "$" + total.toFixed(2);
    };

    window.remove = (i) => {
        let cart = JSON.parse(localStorage.getItem('burgerCart')) || [];
        cart.splice(i, 1);
        localStorage.setItem('burgerCart', JSON.stringify(cart));
        render();
    };
    render();
</script>
</body>
</html>
